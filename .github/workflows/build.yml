name: Build

permissions:
  actions: read
  contents: write

env:
  NODE_VERSION: "22.12.0"
  WINDOWS_APP_ID: "BakaMusic"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  validate-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - run: npm install
      - name: Verify AMLL source integration
        run: |
          test -f src/amll-core/lyric-player/dom/index.ts
          test ! -d vendor/applemusic-like-lyrics
      - name: Type check
        run: npm exec tsc -- --noEmit
      - name: Lint
        run: npm exec eslint -- ./src

  build-windows:
    needs: validate-source
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Print build environment
        run: |
          node -v
          npm -v
          node -e "const pkg=require('./package.json'); const lock=require('./package-lock.json'); console.log('electron='+pkg.devDependencies.electron); console.log('@electron/rebuild='+(lock.packages['node_modules/@electron/rebuild']?.version || 'missing')); console.log('better-sqlite3='+(lock.packages['node_modules/better-sqlite3']?.version || 'missing'));"
      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const pkg=require('./package.json'); const ref=process.env.GITHUB_REF||''; const refName=process.env.GITHUB_REF_NAME||''; const version=ref.startsWith('refs/tags/v') ? refName.slice(1) : pkg.version; fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION='+version+'\nSYNC_PACKAGE_VERSION=' + String(pkg.version !== version) + '\n'); console.log('VERSION=' + version);"
      - name: Sync package version
        if: env.SYNC_PACKAGE_VERSION == 'true'
        run: |
          node -e "const fs=require('fs'); const version=process.env.VERSION; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n'); if (fs.existsSync('package-lock.json')) { const lock=JSON.parse(fs.readFileSync('package-lock.json','utf8')); lock.version=version; if (lock.packages && lock.packages['']) { lock.packages[''].version=version; } fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n'); }"
      - run: npm install
      - name: Clean build output
        run: Remove-Item -Recurse -Force -ErrorAction SilentlyContinue ".webpack", "out"
      - run: npm run package
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build Installer
        run: iscc /DMyAppVersion=${{ env.VERSION }} /DMyAppId=${{ env.WINDOWS_APP_ID }} "./release/build-windows.iss"
      - name: Rename Setup
        run: Rename-Item -Path "./out/BakaMusicSetup.exe" -NewName "BakaMusic-${{ env.VERSION }}-win32-x64-setup.exe"
      - name: Generate Portable
        run: New-Item -ItemType Directory -Force -Path "./out/BakaMusic-win32-x64/portable"
      - name: Build Portable Zip
        run: Compress-Archive -Path "./out/BakaMusic-win32-x64" -DestinationPath "BakaMusic-${{ env.VERSION }}-win32-x64-portable.zip" -Force
      - uses: actions/upload-artifact@v6
        with:
          name: BakaMusic-${{ env.VERSION }}-win32-x64-setup
          path: ./out/BakaMusic-${{ env.VERSION }}-win32-x64-setup.exe
          if-no-files-found: error
      - uses: actions/upload-artifact@v6
        with:
          name: BakaMusic-${{ env.VERSION }}-win32-x64-portable
          path: BakaMusic-${{ env.VERSION }}-win32-x64-portable.zip
          if-no-files-found: error

  build-macos-x64:
    needs: validate-source
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Print build environment
        run: |
          node -v
          npm -v
          node -e "const pkg=require('./package.json'); const lock=require('./package-lock.json'); console.log('electron='+pkg.devDependencies.electron); console.log('@electron/rebuild='+(lock.packages['node_modules/@electron/rebuild']?.version || 'missing')); console.log('better-sqlite3='+(lock.packages['node_modules/better-sqlite3']?.version || 'missing'));"
      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const pkg=require('./package.json'); const ref=process.env.GITHUB_REF||''; const refName=process.env.GITHUB_REF_NAME||''; const version=ref.startsWith('refs/tags/v') ? refName.slice(1) : pkg.version; fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION='+version+'\nSYNC_PACKAGE_VERSION=' + String(pkg.version !== version) + '\n'); console.log('VERSION=' + version);"
      - name: Sync package version
        if: env.SYNC_PACKAGE_VERSION == 'true'
        run: |
          node -e "const fs=require('fs'); const version=process.env.VERSION; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n'); if (fs.existsSync('package-lock.json')) { const lock=JSON.parse(fs.readFileSync('package-lock.json','utf8')); lock.version=version; if (lock.packages && lock.packages['']) { lock.packages[''].version=version; } fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n'); }"
      - run: npm install
      - name: Clean build output
        run: rm -rf .webpack out
      - run: npm run make -- --arch="x64"
      - name: Rename DMG
        run: mv "./out/make/BakaMusic-${{ env.VERSION }}-x64.dmg" "./out/make/BakaMusic-${{ env.VERSION }}-darwin-x64.dmg"
      - uses: actions/upload-artifact@v6
        with:
          name: BakaMusic-${{ env.VERSION }}-darwin-x64
          path: ./out/make/BakaMusic-${{ env.VERSION }}-darwin-x64.dmg
          if-no-files-found: error

  build-macos-arm64:
    needs: validate-source
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Print build environment
        run: |
          node -v
          npm -v
          node -e "const pkg=require('./package.json'); const lock=require('./package-lock.json'); console.log('electron='+pkg.devDependencies.electron); console.log('@electron/rebuild='+(lock.packages['node_modules/@electron/rebuild']?.version || 'missing')); console.log('better-sqlite3='+(lock.packages['node_modules/better-sqlite3']?.version || 'missing'));"
      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const pkg=require('./package.json'); const ref=process.env.GITHUB_REF||''; const refName=process.env.GITHUB_REF_NAME||''; const version=ref.startsWith('refs/tags/v') ? refName.slice(1) : pkg.version; fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION='+version+'\nSYNC_PACKAGE_VERSION=' + String(pkg.version !== version) + '\n'); console.log('VERSION=' + version);"
      - name: Sync package version
        if: env.SYNC_PACKAGE_VERSION == 'true'
        run: |
          node -e "const fs=require('fs'); const version=process.env.VERSION; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n'); if (fs.existsSync('package-lock.json')) { const lock=JSON.parse(fs.readFileSync('package-lock.json','utf8')); lock.version=version; if (lock.packages && lock.packages['']) { lock.packages[''].version=version; } fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n'); }"
      - run: npm install
      - name: Clean build output
        run: rm -rf .webpack out
      - run: npm run make -- --arch="arm64"
      - name: Rename DMG
        run: mv "./out/make/BakaMusic-${{ env.VERSION }}-arm64.dmg" "./out/make/BakaMusic-${{ env.VERSION }}-darwin-arm64.dmg"
      - uses: actions/upload-artifact@v6
        with:
          name: BakaMusic-${{ env.VERSION }}-darwin-arm64
          path: ./out/make/BakaMusic-${{ env.VERSION }}-darwin-arm64.dmg
          if-no-files-found: error

  build-linux:
    needs: validate-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Print build environment
        run: |
          node -v
          npm -v
          node -e "const pkg=require('./package.json'); const lock=require('./package-lock.json'); console.log('electron='+pkg.devDependencies.electron); console.log('@electron/rebuild='+(lock.packages['node_modules/@electron/rebuild']?.version || 'missing')); console.log('better-sqlite3='+(lock.packages['node_modules/better-sqlite3']?.version || 'missing'));"
      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const pkg=require('./package.json'); const ref=process.env.GITHUB_REF||''; const refName=process.env.GITHUB_REF_NAME||''; const version=ref.startsWith('refs/tags/v') ? refName.slice(1) : pkg.version; fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION='+version+'\nSYNC_PACKAGE_VERSION=' + String(pkg.version !== version) + '\n'); console.log('VERSION=' + version);"
      - name: Sync package version
        if: env.SYNC_PACKAGE_VERSION == 'true'
        run: |
          node -e "const fs=require('fs'); const version=process.env.VERSION; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n'); if (fs.existsSync('package-lock.json')) { const lock=JSON.parse(fs.readFileSync('package-lock.json','utf8')); lock.version=version; if (lock.packages && lock.packages['']) { lock.packages[''].version=version; } fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n'); }"
      - run: npm install
      - name: Clean build output
        run: rm -rf .webpack out
      - run: npm run make
      - name: Rename DEB
        run: |
          DEB_FILE=$(find ./out/make/deb/x64/ -name "*.deb" | head -1)
          if [ -n "$DEB_FILE" ]; then
            mv "$DEB_FILE" "./out/make/deb/x64/BakaMusic-${{ env.VERSION }}-linux-amd64.deb"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: BakaMusic-${{ env.VERSION }}-linux-amd64
          path: ./out/make/deb/x64/BakaMusic-${{ env.VERSION }}-linux-amd64.deb
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-macos-x64
      - build-macos-arm64
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./release-assets
          merge-multiple: true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ./release-assets/*
          fail_on_unmatched_files: true
