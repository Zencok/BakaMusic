<svg xmlns="http://www.w3.org/2000/svg" width="188" height="32" viewBox="0 0 188 32" fill="none">
  <g color="currentColor">
    <!-- 唱片 -->
    <circle cx="14" cy="16" r="12" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-opacity="0.3" stroke-width="1.5"/>
    <circle cx="14" cy="16" r="8"  stroke="currentColor" stroke-opacity="0.16" stroke-width="1"/>
    <circle cx="14" cy="16" r="4.5" stroke="currentColor" stroke-opacity="0.16" stroke-width="1"/>
    <circle cx="14" cy="16" r="2.8" fill="currentColor" opacity="0.88"/>

    <!-- 唱针：枢轴圆 → 弧形臂 → 针尖 -->
    <!-- 枢轴圆（右上角） -->
    <circle cx="27.5" cy="5.5" r="2" fill="currentColor" opacity="0.6"/>
    <!-- 弧形臂（从枢轴弯向唱片表面） -->
    <path d="M27.5 7.5 C27 13, 23 14, 20.5 16.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.8"/>
    <!-- 针尖（小三角） -->
    <path d="M19.5 17.8 L20.5 16.5 L21.5 17.8 Z" fill="currentColor" opacity="0.9"/>

    <path d="M34 8V24" stroke="currentColor" stroke-opacity="0.2" stroke-linecap="round"/>

    <text x="44" y="24" fill="currentColor" font-size="22" font-weight="670"
      style="font-family:'Inter','SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif">BakaMusic</text>
  </g>
</svg>
